# Routage des robots d'indexation vers le pre-rendu (P1).
#
# Le SeoRenderController existe et fonctionne depuis le 20/07, mais AUCUNE regle
# ne lui envoyait de robot : Googlebot recevait la coquille de l'application, sans
# titre ni contenu propre a la page. Google indexait une page vide depuis le
# lancement. Verifie le 23/07 par curl, sur trois pages.
#
# Ces `map` doivent vivre au niveau http, d'ou ce fichier separe.

map $http_user_agent $gx_robot {
    default 0;
    "~*(googlebot|bingbot|yandex(bot)?|duckduckbot|baiduspider|slurp|applebot|petalbot)" 1;
    # Les apercus de partage : le lien colle dans WhatsApp ou Messenger doit
    # montrer le vrai titre et la vraie image, pas la coquille generique.
    "~*(facebookexternalhit|facebot|twitterbot|linkedinbot|whatsapp|telegrambot|slackbot|discordbot|pinterest)" 1;
}

# Seules les PAGES vont au pre-rendu. Sans ce second critere, un robot demandant
# robots.txt, le sitemap ou une image recevrait du HTML a la place du fichier —
# et le referencement se casserait la ou l'on croyait le reparer.
map $uri $gx_page {
    default 1;
    "~*\.(js|mjs|css|map|json|xml|txt|ico|png|jpe?g|gif|svg|webp|avif|woff2?|ttf|eot|pdf|apk|zip|webmanifest)$" 0;
}

map "$gx_robot$gx_page" $gx_prerendu {
    default 0;
    "11"    1;
}
