server {
    server_name gextimo.novafriq.africa;
    root /var/www/gextimo_frontend;
    index index.html;
    client_max_body_size 20M;
    location / {
        # Un robot d'indexation recoit le PRE-RENDU, jamais la coquille de
        # l'application : sans cette regle, Googlebot lisait une page sans titre
        # ni contenu propre a la page. Les visiteurs ne sont pas concernes.
        #
        # Le detour par `return 418` puis une location nommee n'est pas une
        # coquetterie : nginx REFUSE un proxy_pass portant un chemin a
        # l'interieur d'un `if`. C'est la seule forme qui passe.
        error_page 418 = @gx_prerendu;
        if ($gx_prerendu) { return 418; }

        try_files $uri $uri/ /index.html;
    }

    location @gx_prerendu {
        rewrite ^.*$ /api/vitrine/seo/render break;
        proxy_pass https://gextimoapi.novafriq.africa;

        # Le pre-rendu lit le chemin demande dans cet en-tete, pas dans l'URL.
        # `$request_uri` garde l'adresse d'ORIGINE malgre la reecriture
        # ci-dessus — sans lui, toutes les pages recevraient l'accueil.
        proxy_set_header X-Original-Path $request_uri;
        proxy_set_header Host gextimoapi.novafriq.africa;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_ssl_server_name on;

        # Une API lente ne doit pas faire attendre un robot indefiniment.
        proxy_connect_timeout 5s;
        proxy_read_timeout 10s;
        proxy_intercept_errors off;
    }
    # Fichiers hachés par Vite : réellement immuables → cache très long.
    location ^~ /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }
    # Service worker : jamais figé (doit pouvoir se mettre à jour).
    location = /sw.js { add_header Cache-Control "no-cache"; }
    # Pages HTML : JAMAIS en cache. index.html référence des fichiers
    # au nom haché ; servi depuis le cache après un déploiement, il
    # pointe vers des fichiers supprimés — écran blanc sans message.
    # Et le suivi, consulté par la direction, doit refléter l'état réel.
    location ~* \.html$ {
        add_header Cache-Control "no-cache, must-revalidate";
        expires -1;
    }
    # Statiques à URL STABLE dont le contenu change (favicon, icônes) :
    # cache court + revalidation. En « immutable » 1 an, un changement
    # de logo n'atteignait jamais les navigateurs (constaté le 19/07).
    location ~* \.(ico|png|jpg|jpeg|gif|svg|webp|webmanifest)$ {
        expires 1h;
        add_header Cache-Control "public, max-age=3600, must-revalidate";
        access_log off;
    }
    location ~* \.(woff|woff2|ttf|eot)$ {
        expires 30d;
        add_header Cache-Control "public";
        access_log off;
    }
    location ~ /\.(?!well-known).* { deny all; }
    error_log  /var/log/nginx/gextimo_frontend_error.log;
    access_log /var/log/nginx/gextimo_frontend_access.log;
    listen 443 ssl;
    ssl_certificate /etc/letsencrypt/live/gextimo.novafriq.africa/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/gextimo.novafriq.africa/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
}
server {
    listen 80;
    server_name gextimo.novafriq.africa;
    return 301 https://$host$request_uri;
}
