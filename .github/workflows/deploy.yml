name: Deploy to VPS

on:
  push:
    branches:
      - master

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts 2>/dev/null

      - name: Deploy
        run: |
          ssh -i ~/.ssh/deploy_key \
              -o StrictHostKeyChecking=accept-new \
              -o ConnectTimeout=30 \
              ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} << 'ENDDEPLOY'
          set -e
          cd /var/www/gextimo_backend

          echo "→ Pull du code..."
          git pull origin master

          echo "→ Installation des dépendances PHP..."
          composer install --optimize-autoloader --no-dev --no-interaction --no-progress

          echo "→ Migrations..."
          php artisan migrate --force

          echo "→ Mise en cache config/routes/vues..."
          php artisan config:cache
          php artisan route:cache
          php artisan view:cache

          echo "→ Redémarrage queue..."
          php artisan queue:restart

          echo "→ Rechargement PHP-FPM..."
          sudo systemctl reload php8.4-fpm

          echo "✓ Déploiement terminé."
          ENDDEPLOY
