name: Deploy Gextimo Backend

on:
  push:
    branches: [ "master" ]
    paths-ignore:
      - '**.md'
      - '.gitignore'
      - 'tests/**'
      - '.env.example'

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: mbstring, xml, ctype, iconv, intl, pdo_pgsql, pgsql, dom, filter, gd, json, bcmath, zip, curl, opcache
          tools: composer:v2
          coverage: none

      - name: Cache Composer
        id: composer-cache
        uses: actions/cache@v4
        with:
          path: vendor
          key: composer-${{ hashFiles('composer.lock') }}
          restore-keys: composer-

      - name: Install dependencies
        if: steps.composer-cache.outputs.cache-hit != 'true'
        run: composer install --no-interaction --prefer-dist --optimize-autoloader --no-dev --no-progress

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          # known_hosts best-effort : ne doit JAMAIS faire échouer le déploiement.
          # Sans délai d'attente ni tolérance, un ssh-keyscan lent cassait toute la
          # chaîne (2 déploiements perdus le 19/07). ssh et rsync utilisent de toute
          # façon StrictHostKeyChecking=no. Même correctif que le workflow frontend.
          ssh-keyscan -T 10 -H ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts 2>/dev/null || true


      - name: Sync files to VPS
        run: |
          # Réessai : la connexion SSH depuis les runners GitHub tombe par
          # intermittence (2 déploiements perdus sur 8 le 20/07, « connection
          # unexpectedly closed »). Le VPS était au repos à chaque fois — c'est le
          # réseau, pas la machine. Sans réessai, un push part vert côté git mais
          # le code ne part jamais en ligne : c'est ainsi qu'un correctif de
          # sécurité est resté non déployé sans que rien ne le signale.
          for essai in 1 2 3; do
            rsync -az --delete \
              --exclude='.git' \
              --exclude='.github' \
              --exclude='.env' \
              --exclude='storage/' \
              --exclude='bootstrap/cache/' \
              -e "ssh -i ~/.ssh/id_ed25519 -o StrictHostKeyChecking=no -o BatchMode=yes -o ConnectionAttempts=5 -o ConnectTimeout=45 -o ServerAliveInterval=15 -o ServerAliveCountMax=4" \
              ./ ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:/var/www/gextimo_backend/ && break
            echo "::warning::rsync a échoué (tentative $essai/3) — nouvelle tentative dans 15 s"
            [ "$essai" = 3 ] && exit 1
            sleep 15
          done

      - name: Deploy Nginx
        run: |
          ssh -i ~/.ssh/id_ed25519 \
              -o StrictHostKeyChecking=no \
              -o BatchMode=yes \
              -o ConnectionAttempts=5 \
              -o ConnectTimeout=45 \
              -o ServerAliveInterval=15 \
              -o ServerAliveCountMax=4 \
              ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} bash << 'ENGNX'

          CONF_SRC=/var/www/gextimo_backend/deploy/nginx.conf
          CONF_DEST=/etc/nginx/sites-available/gextimo_backend.conf
          CONF_LINK=/etc/nginx/sites-enabled/gextimo_backend.conf
          DOMAIN=gextimoapi.novafriq.africa

          # --- Déployer le vhost si la config a changé ---
          if ! diff -q "$CONF_SRC" "$CONF_DEST" > /dev/null 2>&1; then
            sudo cp "$CONF_SRC" "$CONF_DEST"
            echo "→ nginx.conf mis à jour"
          else
            echo "→ nginx.conf inchangé"
          fi

          # --- Activer le site si pas encore fait ---
          if [ ! -L "$CONF_LINK" ]; then
            sudo ln -sf "$CONF_DEST" "$CONF_LINK"
            echo "→ site activé"
          fi

          # --- Tester la config nginx ---
          if sudo nginx -t 2>/dev/null; then
            sudo systemctl reload nginx
            echo "✓ nginx rechargé"
          else
            echo "❌ nginx config invalide — reload annulé"
            sudo nginx -t
            exit 1
          fi

          # --- SSL : certbot si pas encore fait ---
          if [ ! -d "/etc/letsencrypt/live/$DOMAIN" ]; then
            if command -v certbot > /dev/null; then
              echo "→ Génération du certificat SSL..."
              sudo certbot --nginx -d "$DOMAIN" --non-interactive --agree-tos -m dev.djraaa@gmail.com --redirect
              echo "✅ SSL activé"
            else
              echo "⏭️  certbot absent — SSL à configurer manuellement"
            fi
          else
            echo "→ SSL déjà présent"
          fi
          ENGNX

      - name: Post-deploy
        run: |
          ssh -i ~/.ssh/id_ed25519 \
              -o StrictHostKeyChecking=no \
              -o BatchMode=yes \
              -o ConnectionAttempts=5 \
              -o ConnectTimeout=45 \
              -o ServerAliveInterval=15 \
              -o ServerAliveCountMax=4 \
              ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} bash << 'ENDSSH'

          cd /var/www/gextimo_backend

          # --- Dossiers requis (toujours) ---
          mkdir -p storage/framework/{cache/data,sessions,views} \
                   storage/{logs,app/public} \
                   bootstrap/cache
          sudo chown -R $USER:www-data storage bootstrap/cache
          chmod -R 775 storage bootstrap/cache

          ENV_READY=true
          [ ! -f .env ]                                          && ENV_READY=false && echo "⚠️  .env absent"
          ! grep -q "^APP_KEY=base64:" .env 2>/dev/null         && ENV_READY=false && echo "⚠️  APP_KEY manquante"
          grep -q "^DB_PASSWORD=$" .env 2>/dev/null             && ENV_READY=false && echo "⚠️  DB_PASSWORD vide"

          if [ "$ENV_READY" = "true" ]; then
            set -e

            # --- Lien storage ---
            [ ! -L public/storage ] && php artisan storage:link

            # --- Package discovery : bootstrap/cache est exclu du rsync, donc les manifests
            # (packages.php/services.php) doivent être régénérés ici, sinon un nouveau package
            # (ex. Socialite) n'est jamais enregistré → « Target ... is not instantiable ».
            php artisan package:discover --ansi

            # --- Caches ---
            php artisan config:clear
            php artisan cache:clear
            php artisan view:clear
            php artisan route:clear

            # --- Migrations ---
            PENDING=$(php artisan migrate:status --no-ansi 2>/dev/null | grep -c "Pending" || true)
            if [ "$PENDING" -gt 0 ]; then
              echo "→ $PENDING migration(s) en attente..."
              php artisan migrate --force
            else
              echo "→ Aucune migration en attente"
            fi

            # --- Reconstruire caches ---
            php artisan config:cache
            php artisan route:cache
            php artisan view:cache
            php artisan optimize

            # --- Queue (si worker actif) ---
            systemctl is-active --quiet gextimo-worker 2>/dev/null && php artisan queue:restart

            # --- Reload PHP-FPM ---
            sudo systemctl reload php8.4-fpm

            echo "✅ Déploiement complet"
          else
            echo "⏭️  Post-deploy ignoré — configure le .env sur le VPS puis redéploie"
          fi
          ENDSSH
