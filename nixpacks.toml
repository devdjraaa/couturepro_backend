[variables]
NIXPACKS_PHP_VERSION = "8.4"

[phases.setup]
nixPkgs = ["php84", "php84Packages.composer", "php84Extensions.pdo", "php84Extensions.pdo_mysql", "php84Extensions.mbstring", "php84Extensions.tokenizer", "php84Extensions.xml", "php84Extensions.ctype", "php84Extensions.fileinfo", "php84Extensions.openssl", "php84Extensions.curl", "php84Extensions.zip"]

[phases.build]
cmds = ["composer install --optimize-autoloader --no-dev --no-interaction --no-scripts"]

[start]
cmd = "php artisan serve --host=0.0.0.0 --port=$PORT"
